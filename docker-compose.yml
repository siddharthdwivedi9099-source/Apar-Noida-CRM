services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: crm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${S3_API_PORT:-9002}:9000"
      - "${S3_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio_data:/data

  # ---------------------------------------------------------------------------
  # Application services (full-stack run). Infrastructure-only development is
  # still available with: `docker compose up postgres redis minio`.
  # Full stack: `docker compose up --build`.
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Local full-stack runs default to development so the app boots over plain
      # HTTP. The production startup guard (which requires non-default secrets and
      # Secure cookies) only applies when NODE_ENV=production; set it explicitly,
      # together with real secrets and HTTPS, for a production-like run.
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_ENABLED: "true"
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm
      REDIS_ENABLED: "false"
      REDIS_URL: redis://redis:6379
      METRICS_ENABLED: "true"
      QUERY_LOGGING_ENABLED: "true"
      SLOW_QUERY_THRESHOLD_MS: "500"
      DASHBOARD_CACHE_ENABLED: "false"
      DASHBOARD_CACHE_TTL_SECONDS: "60"
      BACKGROUND_WORKERS_ENABLED: "false"
      API_CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-me}
      DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-sample-tenant}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@sample-tenant.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-ChangeMe123!}
      # Local convenience: migrate + seed on startup. Set these to "false" in prod
      # and run migrations as a deliberate, separate step. The education + demo
      # seeds populate sample leads/accounts/opportunities and per-role logins.
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      RUN_EDUCATION_SEED: ${RUN_EDUCATION_SEED:-true}
      RUN_DEMO_SEED: ${RUN_DEMO_SEED:-true}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-4000}/api/v1
        VITE_DEFAULT_TENANT_SLUG: ${DEFAULT_TENANT_SLUG:-sample-tenant}
    container_name: crm-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  postgres_data:
  minio_data:
