# CI pipeline (Phase 30 deployment and DevOps readiness).
# Runs install, typecheck, build, offline tests, deployment artifact validation,
# and API/web image build checks on every push/PR.
name: CI

on:
  push:
    branches: ["main", "codex-*"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    name: Typecheck, build, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (offline suites)
        run: npm test

      - name: Validate deployment artifacts
        run: node tests/phase30-deployment-devops-exhaustive.mjs

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API and web images
        run: docker compose build api web

  # Image publishing + environment deploys are intentionally deferred until the
  # registry and target runtime are selected.
